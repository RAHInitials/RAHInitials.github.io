<!DOCTYPE html>
<head>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-1BmE4kWBq78iYhFldvKuhfTAU6auU8tT94WrHftjDbrCEXSU1oBoqyl2QvZ6jIW3" crossorigin="anonymous">
<link href="ess.css" rel="stylesheet">
</head>

<div class=big_div>
  <image src="BC.P(S)2.png", class="logo"></image>
  <form>
    <!--Keyword-->
    <input type="text" name="topic" value="Enter Additional Keywords (separated by commas)" class="additional"></input>

    <!--Pictures-->
    <div class="info">
      <h5>How Much Information per Slide?</h5>
      <div>
        <div>
          <input type="radio" name="density" value="min" id="min"></input>
          <label for="min">Minimal</label>
        </div>
        <div>
          <input type="radio" name="density" value="med" id="med"></input>
          <label for="med">Medium</label>
        </div>
        <div>
          <input type="radio" name="density" value="dense" id = "dense"></input>
          <label for="dense">Dense</label>
        </div>
      </div>
    </div>

    <!--Length-->
    <div class="length">
      <h5>How Long?</h5>
      <div>
        <div>
          <input type="radio" name="length" value="short" id="short"></input>
          <label for="short">Shorter</label>
        </div>
        <div>
          <input type="radio" name="length" value="medium" id="medium"></input>
          <label for="medium">Medium</label>
        </div>
        <div>
          <input type="radio" name="length" value="long" id = "long"></input>
          <label for="long">Longer</label>
        </div>
      </div>
    </div>

    <a href="create_advanced.html">
    <button type="button" class="btn btn-info advanced">Advanced Settings</button>
    </a>

    <a href="err.html">
      <button type="button" class="btn btn-success create">Create!!!</button>
      </a>

  </form>

  <a href="splashscreen.html">
  <button type="button" class="btn btn-info back">Back to Main Menu</button>
  </a>  
</div>
